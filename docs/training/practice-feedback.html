<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対面練習ふりかえりシート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #f5f5f5;
    }

    .page {
      max-width: 640px;
      margin: 28px auto;
      padding: 0 16px 48px;
    }

    /* ヘッダー */
    .doc-header {
      border-bottom: 3px solid #2a6496;
      padding-bottom: 14px;
      margin-bottom: 28px;
    }
    .doc-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #2a6496;
      letter-spacing: 0.04em;
    }
    .doc-header .subtitle {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    /* 画面の表示切り替え */
    .screen { display: none; }
    .screen.active { display: block; }

    /* セクション見出し */
    h2 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: #2a6496;
      padding: 6px 12px;
      margin: 24px 0 12px;
      border-radius: 2px;
    }
    h3 {
      font-size: 13px;
      font-weight: 700;
      color: #2a6496;
      border-left: 3px solid #2a6496;
      padding-left: 8px;
      margin: 16px 0 8px;
    }

    /* 練習カード（セレクター画面） */
    .practice-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .practice-card {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 6px;
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .practice-card:hover {
      border-color: #2a6496;
      box-shadow: 0 2px 8px rgba(42,100,150,0.15);
    }
    .practice-card .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #2a6496;
      margin-bottom: 4px;
    }
    .practice-card .card-meta {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .practice-card .card-purpose {
      font-size: 13px;
      color: #333;
    }

    /* ボックス */
    .highlight {
      background: #eaf2fb;
      border-left: 4px solid #2a6496;
      padding: 10px 14px;
      margin: 12px 0;
      border-radius: 0 2px 2px 0;
      font-size: 13px;
    }
    .note {
      background: #fffbe6;
      border: 1px solid #f0c040;
      padding: 8px 12px;
      margin: 8px 0;
      border-radius: 2px;
      font-size: 12px;
      color: #7a6000;
    }

    /* ステップリスト */
    .step-list { counter-reset: step; padding-left: 0; list-style: none; margin: 8px 0; }
    .step-list li {
      counter-increment: step;
      padding: 7px 10px 7px 40px;
      position: relative;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .step-list li::before {
      content: counter(step);
      position: absolute;
      left: 10px;
      top: 7px;
      width: 20px;
      height: 20px;
      background: #2a6496;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }

    /* 評価フォーム */
    .criteria-list { list-style: none; padding: 0; margin: 8px 0; }
    .criteria-item {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .criteria-label {
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 10px;
    }
    .rating-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .rating-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #f5f5f5;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s, border-color 0.1s;
      user-select: none;
    }
    .rating-group input[type="radio"] { display: none; }
    .rating-group input[type="radio"]:checked + span {
      font-weight: 700;
    }
    .rating-group label:has(input:checked) {
      background: #2a6496;
      color: #fff;
      border-color: #2a6496;
    }
    .rating-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .r-excellent { background: #27ae60; color: #fff; }
    .r-good      { background: #2980b9; color: #fff; }
    .r-close     { background: #e67e22; color: #fff; }
    .r-miss      { background: #c0392b; color: #fff; }

    /* 自由記述 */
    textarea {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      min-height: 100px;
      margin-top: 4px;
    }
    textarea:focus {
      outline: none;
      border-color: #2a6496;
      box-shadow: 0 0 0 2px rgba(42,100,150,0.15);
    }

    /* ボタン */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: #2a6496;
      color: #fff;
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      font-size: 15px;
    }
    .btn-secondary {
      background: #fff;
      color: #2a6496;
      border: 2px solid #2a6496;
    }
    .btn-copy {
      background: #27ae60;
      color: #fff;
      width: 100%;
      padding: 12px;
      font-size: 15px;
      margin-top: 12px;
    }
    .btn-copy.copied {
      background: #1e8449;
    }
    .btn-reset {
      background: #f5f5f5;
      color: #666;
      border: 1px solid #ccc;
      width: 100%;
      margin-top: 10px;
    }

    /* 戻るリンク */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #2a6496;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 16px;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }
    .back-link:hover { text-decoration: underline; }

    /* プロンプト出力エリア */
    .prompt-area {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 16px;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      color: #333;
      max-height: 420px;
      overflow-y: auto;
      margin-top: 8px;
    }

    /* 使い方ヒント */
    .usage-hint {
      background: #eaf2fb;
      border-left: 4px solid #2a6496;
      padding: 10px 14px;
      margin: 16px 0 8px;
      border-radius: 0 2px 2px 0;
      font-size: 13px;
    }
    .usage-hint ol {
      padding-left: 20px;
      margin-top: 6px;
    }
    .usage-hint li { margin-bottom: 4px; }

    /* バッジ */
    .badge {
      display: inline-block;
      background: #eaf2fb;
      color: #2a6496;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* アコーディオン（手順） */
    .accordion-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: none;
      border: none;
      border-bottom: 1px solid #ddd;
      width: 100%;
      text-align: left;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #2a6496;
      cursor: pointer;
      padding: 10px 2px;
      margin: 12px 0 0;
    }
    .accordion-toggle:hover { text-decoration: underline; }
    .accordion-toggle .chevron {
      font-size: 11px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .accordion-toggle.open .chevron { transform: rotate(180deg); }
    .accordion-body { display: none; padding-top: 4px; }
    .accordion-body.open { display: block; }

    @media (max-width: 480px) {
      .page { margin: 16px auto; }
      .rating-group { gap: 6px; }
      .rating-group label { padding: 5px 10px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="doc-header">
    <h1>対面練習ふりかえりシート</h1>
    <div class="subtitle">練習後の記録をもとに、AIへの相談文を作ります</div>
  </div>

  <!-- ===== 画面1：練習セレクター ===== -->
  <div id="screen-select" class="screen active">
    <div class="highlight">
      練習が終わったら、やった練習を選んで記録を入力してください。<br>
      入力内容をもとに、AIへの相談文を自動で作ります。
    </div>

    <h2>練習を選ぶ</h2>
    <div class="practice-cards" id="practice-cards"></div>
  </div>

  <!-- ===== 画面2：ガイド＋入力フォーム ===== -->
  <div id="screen-form" class="screen">
    <button class="back-link" onclick="showScreen('select')">← 練習を選び直す</button>

    <div id="practice-guide"></div>

    <h2>練習のふりかえりを記録する</h2>
    <form id="feedback-form" onsubmit="return false;">

      <h3>チェック項目</h3>
      <ul class="criteria-list" id="criteria-list"></ul>

      <h3>気になったこと・メモ</h3>
      <div style="font-size:13px; color:#555; margin-bottom:4px;">
        何が起きたか、相手からの反応、気になった点など
      </div>
      <textarea id="free-text" placeholder="例：怒りは見えたが、その奥への言及が遅れた。話し手からは「悲しみの方が近かった」とフィードバックあり。"></textarea>

      <button class="btn btn-primary" onclick="generatePrompt()">AIへの相談文を作る →</button>
    </form>
  </div>

  <!-- ===== 画面3：プロンプト出力 ===== -->
  <div id="screen-prompt" class="screen">
    <button class="back-link" onclick="showScreen('form')">← 入力に戻る</button>

    <h2>AIへの相談文</h2>

    <div class="usage-hint">
      <strong>使い方</strong>
      <ol>
        <li>下の「コピー」ボタンを押す</li>
        <li>Claude・ChatGPT等に貼り付けて送信する</li>
        <li>返ってきた内容をもとに、次の練習方針を考える</li>
      </ol>
    </div>

    <div class="prompt-area" id="prompt-output"></div>
    <button class="btn btn-copy" id="copy-btn" onclick="copyPrompt()">コピーする</button>
    <button class="btn btn-reset" onclick="showScreen('select')">別の練習のふりかえりをする</button>
  </div>

</div>

<script>
// ===== 練習データ =====
const PRACTICES = {
  E: {
    name: "E. 深層感情掘り",
    level: "初級発展",
    purpose: "見えている感情の奥に隠れている、もう一層の感情を言葉にする",
    format: "3人グループ（話し手・聞き手・観察者）",
    duration: "10分（練習7分＋フィードバック3分）",
    evidence: [
      'Greenberg (2002) "Emotion-Focused Therapy"：二次感情（怒り・苛立ち）の下には一次感情（恐れ・悲しみ・恥）がある。一次感情へのアクセスが共感の深さを決定する。',
      "Greenberg & Watson (2006)：一次感情への応答が治療関係・会話継続に有意な効果を示した。"
    ],
    steps: [
      "話し手が2分、最近あった実体験を話す",
      "聞き手：聞きながら「見えている感情」を1語だけ紙にメモする（まだ言わない）",
      "「その感情の奥に、何が隠れていそうか」を心の中で考える",
      "「〜に見えたけど、その奥に〜があるかも」と話し手に伝える",
      "話し手が「どちらが近かったか」「両方あったか」を正直に答える",
      "観察者が「見えている感情と奥の感情、2つを分けて伝えられていたか」を一言フィードバックする"
    ],
    criteria: [
      { id: "reach",       label: "「奥の感情」まで届いていたか（話し手の感覚で）" },
      { id: "distinction", label: "見えている感情と奥の感情を分けて伝えられていたか（観察者）" }
    ],
    note: "「絶対これだ」と断定しない。「〜があるかも」「〜に見えた」という言い方で伝える。"
  },

  I: {
    name: "I. 自己開示ブロック",
    level: "初級メタ",
    purpose: "「私も同じ！」と言いたくなる衝動に気づき、場を話し手に返し続ける",
    format: "2人ペア ＋ 事後メモ",
    duration: "7分（練習5分＋メモ2分）",
    evidence: [
      'Rogers (1961) "On Becoming a Person"：会話の焦点を話し手に置き続けることが共感の基本条件。',
      "Hayes et al. (2012) ACT（Acceptance and Commitment Therapy）：衝動の「気づき」と「距離取り」（defusion）が行動の選択の幅を広げる。"
    ],
    steps: [
      "練習Dと同じ形式でリフレクション練習をする。ただしルールあり →",
      "「私も同じ経験が…」「それって〇〇じゃない？」は全部NG。話し手の言葉だけを返す",
      "練習後、聞き手は2つをメモする：「話したくなった瞬間はどこか」「何を言いかけたか」",
      "ペアで共有する（任意）"
    ],
    criteria: [
      { id: "no_disclose", label: "自分の話をしなかったか（話し手から見て）" },
      { id: "verbalized",  label: "「話したくなった瞬間」を言葉にできたか（聞き手メモ）" }
    ],
    note: "「私も同じ経験が…」を我慢する練習。「解決したくなる」衝動（→練習L）とは別物。"
  },

  L: {
    name: "L. 助言衝動の自覚",
    level: "初級メタ",
    purpose: "「アドバイスしたい」と思った瞬間をリアルタイムで捕まえる",
    format: "ひとりで記録（ペア練習のあと）",
    duration: "練習後5分",
    evidence: [
      'Wells (2000) "Emotional Disorders and the Metacognitive Model"：自分の思考プロセスを観察・監視する力（メタ認知的気づき）の訓練が思考の制御能力を高める。',
      "Hayes et al. (2012) ACT：衝動の「気づき」と「距離取り」（defusion）が行動の選択の幅を広げる。",
      "Flavell (1979)：自己の認知プロセスを監視する能力は訓練可能。"
    ],
    steps: [
      "任意の練習（D・J等）が終わったら、すぐに記録を始める",
      "「アドバイスを言いたくなった瞬間」を思い出して書く",
      "「そのとき、何を言おうとしていたか」も書き添える",
      "ペアで共有する（任意）"
    ],
    criteria: [
      { id: "scene", label: "「アドバイスしたくなった瞬間」を具体的に書けたか" }
    ],
    note: "まず「気づけた」だけでOK。「なぜ言いたかったか」を掘るのは次のステップ。"
  },

  G: {
    name: "G. 修正応答",
    level: "初級発展",
    purpose: "「一発正解」より「ズレを受け取って立て直す力」を鍛える",
    format: "2人ペア",
    duration: "5分",
    evidence: [
      'Safran & Muran (2000) "Negotiating the Therapeutic Alliance"：rupture-repair（亀裂と修復）のプロセスは関係深化に寄与する。一度外すことは問題ではなく、修正の質が重要。',
      "Kornell & Bjork (2008) error-based learning：誤りを犯した直後のフィードバックと再試行は記憶定着率が高く、訂正学習の標準的知見となっている。"
    ],
    steps: [
      "話し手が2〜3分、最近あった実体験を話す",
      "聞き手が1文でリフレクションを返す（あえて外しても構わない）",
      "話し手が「ズレてた。実際は〇〇に近い」と正直に伝える",
      "聞き手がその修正を受けて、もう1回だけリフレクションを返す",
      "話し手が2回目を評価する"
    ],
    criteria: [
      { id: "improved",    label: "2回目は1回目より近かったか（話し手の感覚で）" },
      { id: "no_apology",  label: "「ズレた、直そう」と受け取れたか（過剰な謝罪はなかったか）" }
    ],
    note: "外れることは失敗じゃない。「ズレを受け取ってすぐ調整できるか」がこの練習の本題。"
  },

  J: {
    name: "J. フォローアップループ→要約",
    level: "中級",
    purpose: "3回の問いかけで核心に迫り、最後に1文で返す",
    format: "3人グループ（話し手・聞き手・観察者）",
    duration: "10分",
    evidence: [
      'Miller & Rollnick (2013) "Motivational Interviewing, 3rd ed."：OARS（開かれた質問・肯定・リフレクション・要約）は動機づけ面接の中核構造。フォローアップ→要約のループが話し手の自己理解を促進する。',
      "Clarification sequence（明確化連鎖）：オープン質問による段階的明確化が話し手の自己理解を促進する。"
    ],
    steps: [
      "話し手が2〜3分、最近あった実体験を話す",
      "聞き手は最大3回、話し手の言葉を拾いながら問いかける（「それってどういう意味で？」など）",
      "3回が終わったら、状況と感情を1文にまとめて話し手に返す",
      "話し手が「それ、合ってた？」を正直に答える"
    ],
    criteria: [
      { id: "summary_fit",  label: "要約を聞いて「そう、それ」と思えたか（話し手の感覚で）" },
      { id: "felt_heard",   label: "問いかけが「聞いてほしかった」感じだったか（尋問感でなく）" },
      { id: "open_q",       label: "問いかけが話し手の言葉を拾っていたか（観察者）" },
      { id: "within_limit", label: "問いかけは3回以内だったか（観察者）" }
    ],
    note: "3回制限は「尋問にならないための歯止め」。足りなくても要約に移ることで、まとめる力を鍛える。"
  }
};

// ===== 状態 =====
let currentPractice = null;

// ===== 画面切り替え =====
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== セレクター画面の描画 =====
function renderSelector() {
  const container = document.getElementById('practice-cards');
  container.innerHTML = '';
  for (const [id, p] of Object.entries(PRACTICES)) {
    const card = document.createElement('div');
    card.className = 'practice-card';
    card.innerHTML = `
      <div class="card-title">${p.name} <span class="badge">${p.level}</span></div>
      <div class="card-meta">${p.format} ／ ${p.duration}</div>
      <div class="card-purpose">${p.purpose}</div>
    `;
    card.addEventListener('click', () => selectPractice(id));
    container.appendChild(card);
  }
}

// ===== 練習選択 =====
function selectPractice(id) {
  currentPractice = id;
  renderGuide(id);
  renderCriteria(id);
  document.getElementById('free-text').value = '';
  showScreen('form');
}

// ===== ガイド表示 =====
function renderGuide(id) {
  const p = PRACTICES[id];
  const stepsHtml = p.steps.map(s => `<li>${s}</li>`).join('');

  document.getElementById('practice-guide').innerHTML = `
    <h2>${p.name}</h2>
    <div class="highlight"><strong>目的：</strong>${p.purpose}</div>
    <div class="note">⚠ ${p.note}</div>

    <button class="accordion-toggle" onclick="toggleAccordion(this)" type="button">
      手順を確認する <span class="chevron">▼</span>
    </button>
    <div class="accordion-body">
      <ol class="step-list" style="margin-top:8px;">${stepsHtml}</ol>
    </div>
  `;
}

// ===== アコーディオン =====
function toggleAccordion(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

// ===== 評価フォーム描画 =====
const RATINGS = [
  { value: '◎ できた',        cls: 'r-excellent', short: '◎' },
  { value: '○ おおむねできた', cls: 'r-good',      short: '○' },
  { value: '△ 惜しかった',    cls: 'r-close',     short: '△' },
  { value: '✕ できなかった',   cls: 'r-miss',      short: '✕' }
];

function renderCriteria(id) {
  const p = PRACTICES[id];
  const list = document.getElementById('criteria-list');
  list.innerHTML = '';

  p.criteria.forEach((c, i) => {
    const radiosHtml = RATINGS.map(r => `
      <label>
        <input type="radio" name="rating_${i}" value="${r.value}">
        <span><span class="rating-circle ${r.cls}">${r.short}</span> ${r.value.replace(/^[◎○△✕] /, '')}</span>
      </label>
    `).join('');

    const item = document.createElement('li');
    item.className = 'criteria-item';
    item.innerHTML = `
      <div class="criteria-label">${i + 1}. ${c.label}</div>
      <div class="rating-group">${radiosHtml}</div>
    `;
    list.appendChild(item);
  });
}

// ===== プロンプト生成 =====
function generatePrompt() {
  const p = PRACTICES[currentPractice];
  const freeText = document.getElementById('free-text').value.trim() || '（なし）';

  // 評価軸の選択値を収集
  const criteriaLines = p.criteria.map((c, i) => {
    const selected = document.querySelector(`input[name="rating_${i}"]:checked`);
    const val = selected ? selected.value : '（未選択）';
    return `[チェック] ${c.label}：${val}`;
  }).join('\n');

  const evidenceLines = p.evidence.map(e => `- ${e}`).join('\n');
  const criteriaDescs = p.criteria.map(c => `- ${c.label}`).join('\n');

  const prompt = `## やった練習
練習名: ${p.name}
形式: ${p.format}
目的: ${p.purpose}

## 理論的背景（参考）
${evidenceLines}

## この練習で見るポイント
${criteriaDescs}

## 今回の記録
${criteriaLines}
[メモ] ${freeText}

## お願い
上記の練習記録をアクティブリスニングの観点でフィードバックしてください。次回に活かせる具体的な改善点を教えてもらえると助かります。`;

  document.getElementById('prompt-output').textContent = prompt;

  const copyBtn = document.getElementById('copy-btn');
  copyBtn.textContent = 'コピー';
  copyBtn.classList.remove('copied');

  showScreen('prompt');
}

// ===== コピー =====
function copyPrompt() {
  const text = document.getElementById('prompt-output').textContent;
  const btn = document.getElementById('copy-btn');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'コピーしました ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'コピー';
        btn.classList.remove('copied');
      }, 2500);
    }).catch(() => fallbackCopy(text, btn));
  } else {
    fallbackCopy(text, btn);
  }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    btn.textContent = 'コピーしました ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 2500);
  } catch (e) {
    btn.textContent = '手動でコピーしてください';
  }
  document.body.removeChild(ta);
}

// ===== 初期化 =====
renderSelector();
